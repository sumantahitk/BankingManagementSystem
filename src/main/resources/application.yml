spring:
  application:
    name: springbanking

  datasource:
    url: jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# JWT Configuration
jwt:
  secret: dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGtleSBmb3IgSldUIHRva2VuIGdlbmVyYXRpb24gaW4gc3ByaW5nIGJhbmtpbmcgYXBw
  expiration: 86400000

# Server Configuration
server:
  port: 8080

# Logging
logging:
  level:
    root: INFO
    org.banking: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
